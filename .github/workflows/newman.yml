name: API Contract and Integration Testing
on: [push, pull_request]

jobs:
  contract-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Dependencies
      run: |
        npm install
        npm install -g newman newman-reporter-htmlextra @stoplight/prism-cli

    - name: Lint OpenAPI contracts
      run: |
        npx @stoplight/spectral-cli lint contracts/*.yaml

    - name: Start Prism mock servers
      run: |
        # Chạy ngầm Mock Server IoT (Port 4010)
        npx @stoplight/prism-cli mock contracts/iot-ingestion.openapi.yaml -p 4010 --host 0.0.0.0 &
        # Chạy ngầm Mock Server AI Vision (Port 4011)
        npx @stoplight/prism-cli mock contracts/ai-vision.openapi.yaml -p 4011 --host 0.0.0.0 &
        sleep 5

    - name: Wait for mock servers
      run: |
        npx wait-on http://localhost:4010/health http://localhost:4011/health --timeout 30000

    - name: Run Newman contract tests
      run: |
        mkdir -p reports
        npm run test:mock

    - name: Upload Newman reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: newman-report
        path: reports/
