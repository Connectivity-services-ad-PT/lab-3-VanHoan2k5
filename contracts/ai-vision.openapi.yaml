openapi: 3.0.3
info:
  title: Smart Campus — AI Vision API
  version: 0.3.0
  contact:
    name: Team B1
    email: teamb1@smartcampus.edu.vn
  description: Contract mock tối thiểu cho consumer-side smoke test trong FIT4110 Lab 03. File này giúp Camera Stream hoặc Core Business gọi thử AI Vision khi service thật chưa hoàn thiện.
servers:
  - url: http://localhost:4011
    description: Prism mock server for AI Vision
tags:
  - name: vision
    description: Image detection
  - name: system
    description: Health and runtime information
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [system]
      operationId: getVisionHealth
      summary: Kiểm tra trạng thái AI Vision mock
      description: Public health check dùng để kiểm tra mock AI Vision đã sẵn sàng.
      security: []
      responses:
        "200":
          description: Service đang hoạt động
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /detect:
    post:
      tags: [vision]
      operationId: detectImage
      summary: Phát hiện đối tượng trong ảnh
      description: Endpoint mock tối thiểu để consumer kiểm tra luồng Camera/Core gọi AI Vision.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DetectionRequest"
      responses:
        "200":
          description: Kết quả nhận diện
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionResponse"
        "400":
          description: Request không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "401":
          description: Thiếu hoặc sai token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DetectionRequest:
      type: object
      required: [camera_id]
      properties:
        camera_id:
          type: string
          minLength: 3
          example: CAM01
        image_url:
          type: string
          format: uri
          example: https://example.com
        image_base64:
          type: string
          description: Chuỗi base64 nếu không dùng image_url

    DetectionResponse:
      type: object
      required: [detection_id, label, confidence, risk_level]
      properties:
        detection_id:
          type: string
          example: DET001
        camera_id:
          type: string
          example: CAM01
        label:
          type: string
          enum: [person, vehicle, unknown]
          example: person
        confidence:
          type: number
          minimum: 0
          maximum: 1
          example: 0.91
        risk_level:
          type: string
          enum: [low, medium, high]
          example: medium

    HealthResponse:
      type: object
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        service:
          type: string
          example: ai-vision
        version:
          type: string
          example: 0.3.0

    ProblemDetails:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
        instance:
          type: string
