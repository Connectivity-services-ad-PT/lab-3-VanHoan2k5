openapi: 3.0.3
info:
  title: Smart Campus IoT Ingestion Service
  description: API Ingestion service for collecting telemetry data from campus IoT sensors.
  version: 1.0.0
  contact:
    name: Nhóm B1
    email: hoanvan2k5@gmail.com
tags:
  - name: Telemetry
    description: IoT Sensor data telemetry operations
  - name: System
    description: Health and runtime information
paths:
  /health:
    get:
      summary: Check health status
      description: Returns the health status of the IoT ingestion mock server.
      operationId: getIotHealth
      tags:
        - System
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /telemetry/mock-check:
    post:
      summary: Submit IoT Sensor Readings
      description: Sends real-time telemetry data from registered campus IoT sensors to the ingestion core.
      operationId: submitTelemetryReadings
      tags:
        - Telemetry
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sensorId
                - value
              properties:
                sensorId:
                  type: string
                  example: "SENSOR-XYZ-01"
                value:
                  type: number
                  example: 25.5
                status:
                  type: string
                  example: "active"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - readingId
                  - status
                properties:
                  readingId:
                    type: string
                    example: "read-123456"
                  status:
                    type: string
                    example: "processed"
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
