openapi: 3.0.3
info:
  title: Smart Campus IoT Ingestion Service
  version: 1.0.0
paths:
  /telemetry/mock-check:
    post:
      summary: Submit IoT Sensor Readings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sensorId
                - value
              properties:
                sensorId:
                  type: string
                  example: "SENSOR-XYZ-01"
                value:
                  type: number
                  example: 25.5
                status:
                  type: string
                  example: "active"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - readingId
                  - status
                properties:
                  readingId:
                    type: string
                    example: "read-123456"
                  status:
                    type: string
                    example: "processed"
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
